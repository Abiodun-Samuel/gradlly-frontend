# docker-compose.dev.yml
services:
  main-app:
    build:
      target: dev-deps
      args:
        NEXT_PUBLIC_PORTAL: main
        NEXT_PUBLIC_EMPLOYER_URL: http://localhost:3002
        NEXT_PUBLIC_PROVIDER_URL: http://localhost:3004
        NEXT_PUBLIC_APPRENTICE_URL: http://localhost:3001
        NEXT_PUBLIC_FLOW_URL: http://localhost:3003
        NEXT_PUBLIC_MAIN_URL: http://localhost:3005
    volumes:
      - .:/app
      # Anonymous volumes prevent the host mount from overwriting the
      # container's node_modules and .next. This is critical — without
      # /app/node_modules the volume mount would wipe all @gradlly/*
      # symlinks that were created during the dev-deps build stage.
      - /app/node_modules
      - /app/apps/main/.next
    command: npm run dev --workspace=apps/main
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_PORTAL=main
      - NEXT_PUBLIC_EMPLOYER_URL=http://localhost:3002
      - NEXT_PUBLIC_PROVIDER_URL=http://localhost:3004
      - NEXT_PUBLIC_APPRENTICE_URL=http://localhost:3001
      - NEXT_PUBLIC_FLOW_URL=http://localhost:3003
      - NEXT_PUBLIC_MAIN_URL=http://localhost:3005

  employer-app:
